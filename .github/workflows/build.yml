name: Build

# Chạy khi push tag dạng v1.0.0, hoặc bấm tay trong tab Actions.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            asset: AutoClicker-Windows.zip
          # Chỉ build Apple Silicon. Runner Intel (macos-13) là loại cuối cùng
          # GitHub còn cung cấp và đang bị thu hẹp — job từng xếp hàng 38 phút
          # không chạy, chặn luôn việc tạo Release. Cần bản Intel thì build tay
          # trên máy Intel bằng build_mac.sh.
          - os: macos-latest
            label: macOS (Apple Silicon)
            asset: AutoClicker-macOS-AppleSilicon.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài thư viện
        run: pip install -r requirements.txt

      - name: Đóng gói
        run: >
          pyinstaller --onefile --windowed --name AutoClicker
          --clean --noconfirm autoclicker.py

      - name: Nén bản Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/AutoClicker.exe -DestinationPath ${{ matrix.asset }}

      # ditto giữ nguyên quyền thực thi và symlink bên trong .app,
      # zip thường sẽ làm hỏng bundle.
      - name: Nén bản macOS
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/AutoClicker.app ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Tạo Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          body: |
            ## Tải về

            | Máy của bạn | File |
            |---|---|
            | Windows | `AutoClicker-Windows.zip` |
            | Mac chip M1/M2/M3/M4 | `AutoClicker-macOS-AppleSilicon.zip` |

            Mac chip Intel chưa có bản dựng sẵn — build tay bằng `build_mac.sh`.

            Giải nén rồi mở lên chạy, không cần cài Python.

            **macOS**: lần đầu bị chặn vì app chưa ký số — chuột phải vào app →
            Open → Open. Sau đó vào System Settings → Privacy & Security cấp quyền
            **Accessibility** (điều khiển chuột) và **Input Monitoring** (phím tắt F8/ESC).

            **Windows**: nếu Defender cảnh báo → More info → Run anyway.
